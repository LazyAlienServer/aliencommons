packages:
  - "apps/*"
  - "packages/*"
  - "!packages/drf-std-response"

allowBuilds:
  "@parcel/watcher": true
  esbuild: true
  unrs-resolver: true
catalog:
  vite: ^8.0.16
  vitest: ^4.1.9
  vite-plus: ^0.2.1
overrides:
  esbuild: ^0.28.1
  form-data: ^4.0.6
  hono: ^4.12.26
  launch-editor: ^2.14.1
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
