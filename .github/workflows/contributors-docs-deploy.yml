name: "Contributors Docs: Deploy"

on:
  push:
    branches:
      - main
    paths:
      - "docs/contributors/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/contributors-docs-deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: docs/contributors

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.23"
          enable-cache: true
          working-directory: .
          cache-suffix: contributors-docs-deploy

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install documentation dependencies
        run: uv sync --project ../.. --locked --package aliencommons-contributor-docs

      - name: Build MkDocs site
        run: uv run --project ../.. --package aliencommons-contributor-docs mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/contributors/site
          include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
