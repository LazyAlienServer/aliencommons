name: "Main: Fast-forward from dev"

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fast-forward-main
  cancel-in-progress: false

jobs:
  fast-forward:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Fast-forward main to dev
        run: |
          git fetch origin main dev
          git checkout main
          git merge --ff-only origin/dev
          git push origin main
