services:
  postgres:
    volumes:
      - postgres_data_dev:/var/lib/postgresql
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
    ports:
      - "5432:5432"
    env_file:
    - ./env/.env.dev
  
  redis:
    ports:
      - "6379:6379"
  
  alloy:
    image: grafana/alloy:latest
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/alloy.config.dev
    volumes:
      - ./observability/alloy/alloy.config.dev:/etc/alloy/alloy.config.dev:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/loki.dev.yml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki.dev.yml:/etc/loki/loki.dev.yml:ro
      - ./observability/loki/data:/loki
  
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning/datasources/loki-data.dev.yml:/etc/grafana/provisioning/datasources/loki-data.dev.yml:ro
      - ./observability/grafana/data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  postgres_data_dev: