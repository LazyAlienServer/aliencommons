version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      pnpm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directories:
      - "/apps/backend"
      - "/docs/users"
      - "/docs/alienmark"
      - "/docs/contributors"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
