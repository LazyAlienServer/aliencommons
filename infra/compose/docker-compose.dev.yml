x-stack-env: &stack-env
  env_file:
    - ../../env/.env.dev

name: aliencommons-dev

services:
  postgres:
    <<: *stack-env
    volumes:
      - postgres_data_dev:/var/lib/postgresql
    ports:
      - "5432:5432"

  redis:
    <<: *stack-env
    command: >
      sh -c 'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'
    ports:
      - "6379:6379"

  backend-init:
    <<: *stack-env
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    working_dir: /code/apps/backend
    command: >
      sh -c "python manage.py migrate && python manage.py init_tasks"
    depends_on:
      - postgres
      - redis
    volumes:
      - ../../apps/backend:/code/apps/backend
      - /code/.venv

  backend-api:
    <<: *stack-env
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    working_dir: /code/apps/backend
    restart: unless-stopped
    command: >
      sh -c "daphne -b 0.0.0.0 -p 8000 backend.asgi:application"
    depends_on:
      - alienmark
    volumes:
      - ../../apps/backend:/code/apps/backend
      - /code/.venv
    ports:
      - "8000:8000"

  backend-task-scheduler:
    <<: *stack-env
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    working_dir: /code/apps/backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py runscheduler"
    depends_on:
      - redis
      - postgres
    volumes:
      - ../../apps/backend:/code/apps/backend
      - /code/.venv

  backend-task-worker:
    <<: *stack-env
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    working_dir: /code/apps/backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py rqworker default email maintenance"
    depends_on:
      - redis
      - postgres
    volumes:
      - ../../apps/backend:/code/apps/backend
      - /code/.venv

  frontend:
    image: node:24
    restart: unless-stopped
    working_dir: /code
    command: >
      sh -c "
        pnpm install &&
        pnpm run dev
      "
    ports:
      - "8080:5173"
    volumes:
      - ../../apps/frontend:/code
      - /code/node_modules

  alienmark:
    build:
      context: ../..
      dockerfile: apps/alienmark/Dockerfile
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8787

  alloy:
    image: grafana/alloy:v1.17.0
    restart: unless-stopped
    command:
      - run
      - --disable-reporting
      - --server.http.listen-addr=0.0.0.0:12345
      - --server.http.enable-pprof=false
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    environment:
      ALLOY_COMPOSE_PROJECT: aliencommons-dev
      ALLOY_ENVIRONMENT: dev
    volumes:
      - ../../o11y/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ../../o11y/alloy/data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
        restart: true

  loki:
    image: grafana/loki:3.7.2
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/loki.yml
      - -config.expand-env=true
    environment:
      LOKI_RETENTION_PERIOD: 168h
    volumes:
      - ../../o11y/loki/loki.yml:/etc/loki/loki.yml:ro
      - ../../o11y/loki/data:/loki
    ports:
      - "3100:3100"
    # The official Loki image is distroless, so health checks cannot use a shell.
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/loki",
          "-config.file=/etc/loki/loki.yml",
          "-config.expand-env=true",
          "-verify-config=true",
        ]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 2s
    stop_grace_period: 1m

  grafana:
    image: grafana/grafana:13.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
    volumes:
      - ../../o11y/grafana/provisioning/datasources/loki.yml:/etc/grafana/provisioning/datasources/loki.yml:ro
      - ../../o11y/grafana/data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
        restart: true
    ports:
      - "3000:3000"

volumes:
  postgres_data_dev:
