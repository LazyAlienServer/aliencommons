name: "Backend: Lint"

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend-lint.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install lint dependencies
        run: uv sync --locked --dev

      - name: Run Ruff
        run: >
          uv run ruff check
          articles
          bookmarks
          comments
          backend
          core
          logs
          reactions
          reports
          tasks
          users
          manage.py
