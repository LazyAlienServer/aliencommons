components:
  schemas:
    ArticleEvent:
      type: object
      description: Serializer for article moderation events. All fields are ready-only
        except annotation.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        annotation:
          type: string
          readOnly: true
          nullable: true
        event_type:
          allOf:
          - $ref: '#/components/schemas/EventTypeEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        article:
          type: string
          format: uuid
          readOnly: true
        snapshot:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        actor:
          type: integer
          readOnly: true
          nullable: true
      required:
      - actor
      - annotation
      - article
      - created_at
      - event_type
      - id
      - snapshot
    ArticleSnapshot:
      type: object
      description: Serializer for article snapshots. All fields are ready-only.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        moderation_status_display:
          type: string
          readOnly: true
        article_id:
          type: string
          readOnly: true
        title:
          type: string
          readOnly: true
        content:
          readOnly: true
        content_hash:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        moderation_status:
          allOf:
          - $ref: '#/components/schemas/ModerationStatusEnum'
          readOnly: true
        article:
          type: string
          format: uuid
          readOnly: true
      required:
      - article
      - article_id
      - content
      - content_hash
      - created_at
      - id
      - moderation_status
      - moderation_status_display
      - title
    EventTypeEnum:
      enum:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      type: integer
      description: |-
        * `1` - Submit
        * `2` - Withdraw
        * `3` - Approve
        * `4` - Reject
        * `5` - Unpublish
        * `6` - Delete
    LevelEnum:
      enum:
      - debug
      - info
      - warn
      - error
      type: string
      description: |-
        * `debug` - DEBUG
        * `info` - INFO
        * `warn` - WARN
        * `error` - ERROR
    ListFELog:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/SingleFELog'
      required:
      - logs
    ModerationStatusEnum:
      enum:
      - 1
      - 2
      - 3
      - 4
      type: integer
      description: |-
        * `1` - Pending
        * `2` - Withdrawn
        * `3` - Approved
        * `4` - Rejected
    PaginatedArticleEventList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
