name: "AlienMark Docs: Deploy"

on:
  push:
    branches:
      - main
    paths:
      - "docs/alienmark/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/alienmark-docs-deploy.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: docs/alienmark

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          working-directory: .
          cache-suffix: alienmark-docs-deploy

      - name: Install docs dependencies
        run: uv sync --project ../.. --locked --package alienmark-docs

      - name: Build MkDocs site
        run: uv run --project ../.. --package alienmark-docs mkdocs build --strict

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Deploy site to S3
        run: aws s3 sync site/ s3://${{ vars.AWS_S3_BUCKET }}/ --delete
