x-stack-env: &stack-env
  env_file:
    - ../../env/.env.pro

name: aliencommons-pro

services:
  postgres:
    <<: *stack-env
    volumes:
      - postgres_data_pro:/var/lib/postgresql

  redis:
    <<: *stack-env
    command: >
      sh -c 'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'

  backend-init:
    <<: *stack-env
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    working_dir: /code/apps/backend
    command: >
      sh -c "python manage.py migrate && python manage.py init_tasks"
    depends_on:
      - postgres
      - redis

  backend-api:
    <<: *stack-env
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    working_dir: /code/apps/backend
    restart: unless-stopped
    command: >
      sh -c "daphne -b 0.0.0.0 -p 8000 backend.asgi:application"
    depends_on:
      - alienmark
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-production.rule=Host(`api.aliencommons.com`)"
      - "traefik.http.routers.backend-production.entrypoints=websecure"
      - "traefik.http.routers.backend-production.middlewares=web-secure@file"
      - "traefik.http.routers.backend-production.tls.certresolver=le"
      - "traefik.http.services.backend-production.loadbalancer.server.port=8000"
    networks:
      - default
      - proxy
    volumes:
      - /srv/aliencommons/pro/static:/code/apps/backend/staticfiles

  backend-task-scheduler:
    <<: *stack-env
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    working_dir: /code/apps/backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py runscheduler"

  backend-task-worker:
    <<: *stack-env
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    working_dir: /code/apps/backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py rqworker default email maintenance"

  alloy:
    image: grafana/alloy:v1.17.0
    restart: unless-stopped
    command:
      - run
      - --disable-reporting
      - --server.http.listen-addr=0.0.0.0:12345
      - --server.http.enable-pprof=false
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    environment:
      ALLOY_COMPOSE_PROJECT: aliencommons-pro
      ALLOY_ENVIRONMENT: pro
    volumes:
      - ../../o11y/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /srv/aliencommons/pro/alloy:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
        restart: true

  loki:
    image: grafana/loki:3.7.2
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/loki.yml
      - -config.expand-env=true
    environment:
      LOKI_RETENTION_PERIOD: 720h
    volumes:
      - ../../o11y/loki/loki.yml:/etc/loki/loki.yml:ro
      - /srv/aliencommons/pro/loki:/loki
    # The official Loki image is distroless, so health checks cannot use a shell.
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/loki",
          "-config.file=/etc/loki/loki.yml",
          "-config.expand-env=true",
          "-verify-config=true",
        ]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 2s
    stop_grace_period: 1m

  grafana:
    image: grafana/grafana:13.1.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in env/.env.pro}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
    volumes:
      - ../../o11y/grafana/provisioning/datasources/loki.yml:/etc/grafana/provisioning/datasources/loki.yml:ro
      - /srv/aliencommons/pro/grafana:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
        restart: true

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_MODE: production
    working_dir: /code
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-production.rule=Host(`aliencommons.com`)"
      - "traefik.http.routers.frontend-production.entrypoints=websecure"
      - "traefik.http.routers.frontend-production.middlewares=web-secure@file"
      - "traefik.http.routers.frontend-production.tls.certresolver=le"
      - "traefik.http.services.frontend-production.loadbalancer.server.port=80"
    networks:
      - default
      - proxy

  alienmark:
    build:
      context: ../..
      dockerfile: apps/alienmark/Dockerfile
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8787

  static:
    image: nginx:alpine
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.static-production.rule=Host(`api.aliencommons.com`) && PathPrefix(`/static`)"
      - "traefik.http.routers.static-production.entrypoints=websecure"
      - "traefik.http.routers.static-production.middlewares=web-secure@file"
      - "traefik.http.routers.static-production.tls.certresolver=le"
      - "traefik.http.services.static-production.loadbalancer.server.port=80"
    networks:
      - proxy
    restart: unless-stopped
    volumes:
      - /srv/aliencommons/pro/static:/usr/share/nginx/html/static:ro

volumes:
  postgres_data_pro:

networks:
  proxy:
    external: true
    name: aliencommons-proxy
