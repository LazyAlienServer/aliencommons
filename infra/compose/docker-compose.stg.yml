x-stack-env: &stack-env
  env_file:
    - ../../env/.env.stg

name: aliencommons-stg

services:
  postgres:
    <<: *stack-env
    volumes:
      - postgres_data_stg:/var/lib/postgresql

  redis:
    <<: *stack-env
    command: >
      sh -c 'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'

  backend-init:
    <<: *stack-env
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    working_dir: /code/apps/backend
    command: >
      sh -c "python manage.py migrate && python manage.py init_tasks"
    depends_on:
      - postgres
      - redis

  backend-api:
    <<: *stack-env
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    working_dir: /code/apps/backend
    restart: unless-stopped
    command: >
      sh -c "daphne -b 0.0.0.0 -p 8000 backend.asgi:application"
    depends_on:
      - alienmark
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-api-stg.rule=Host(`api-stg.aliencommons.com`)"
      - "traefik.http.routers.backend-api-stg.entrypoints=websecure"
      - "traefik.http.routers.backend-api-stg.tls.certresolver=le"
      - "traefik.http.services.backend-api-stg.loadbalancer.server.port=8000"
    volumes:
      - /srv/aliencommons/stg/static:/code/apps/backend/staticfiles

  backend-task-scheduler:
    <<: *stack-env
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    working_dir: /code/apps/backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py runscheduler"

  backend-task-worker:
    <<: *stack-env
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    working_dir: /code/apps/backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py rqworker default email maintenance"

  alloy:
    image: grafana/alloy:v1.17.0
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    environment:
      ALLOY_COMPOSE_PROJECT: aliencommons-stg
      ALLOY_ENVIRONMENT: stg
    volumes:
      - ../../o11y/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /srv/aliencommons/stg/alloy:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
        restart: true

  loki:
    image: grafana/loki:3.7.2
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/loki.yml
      - -config.expand-env=true
    environment:
      LOKI_RETENTION_PERIOD: 336h
    volumes:
      - ../../o11y/loki/loki.yml:/etc/loki/loki.yml:ro
      - /srv/aliencommons/stg/loki:/loki
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    stop_grace_period: 1m

  grafana:
    image: grafana/grafana:13.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in env/.env.stg}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana-stg.rule=Host(`grafana-stg.aliencommons.com`)"
      - "traefik.http.routers.grafana-stg.entrypoints=websecure"
      - "traefik.http.routers.grafana-stg.tls.certresolver=le"
      - "traefik.http.services.grafana-stg.loadbalancer.server.port=3000"
    volumes:
      - ../../o11y/grafana/provisioning/datasources/loki.yml:/etc/grafana/provisioning/datasources/loki.yml:ro
      - /srv/aliencommons/stg/grafana:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
        restart: true

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_MODE: stg
    working_dir: /code
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-stg.rule=Host(`stg.aliencommons.com`)"
      - "traefik.http.routers.frontend-stg.entrypoints=websecure"
      - "traefik.http.routers.frontend-stg.tls.certresolver=le"
      - "traefik.http.services.frontend-stg.loadbalancer.server.port=80"

  alienmark:
    build:
      context: ../..
      dockerfile: apps/alienmark/Dockerfile
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8787

  static:
    image: nginx:alpine
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.static.rule=Host(`api-stg.aliencommons.com`) && PathPrefix(`/static`)"
      - "traefik.http.routers.static.entrypoints=websecure"
      - "traefik.http.routers.static.tls.certresolver=le"
      - "traefik.http.services.static.loadbalancer.server.port=80"
    restart: unless-stopped
    volumes:
      - /srv/aliencommons/stg/static:/usr/share/nginx/html/static:ro

volumes:
  postgres_data_stg:
